<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minu Päevik</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --apple-bg: #F2F2F7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--apple-bg); user-select: none; -webkit-tap-highlight-color: transparent; color: #1C1C1E; }
        .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pin-screen { position: fixed; inset: 0; background: var(--apple-bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { background: white; border: 0.5px solid #C6C6C8; border-radius: 10px; padding: 12px; width: 100%; font-size: 17px; outline: none; }
        input:focus { border-color: #007AFF; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #8E8E93; font-size: 11px; font-weight: 500; }
        .nav-btn.active { color: #007AFF; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-bottom: 0.5px solid #C6C6C8; }
        .history-item:last-child { border-bottom: none; }
        .btn-primary { background-color: #007AFF; color: white; font-weight: 600; border-radius: 10px; transition: opacity 0.2s; }
        .btn-primary:active { opacity: 0.7; }
    </style>
</head>
<body class="pb-32">

    <div id="pin-screen" class="pin-screen">
        <h2 id="pin-label" class="text-xl font-semibold mb-8 text-slate-800">Sisesta PIN</h2>
        <div class="flex gap-6 mb-12">
            <div id="dot-1" class="w-3.5 h-3.5 rounded-full border border-slate-400"></div>
            <div id="dot-2" class="w-3.5 h-3.5 rounded-full border border-slate-400"></div>
            <div id="dot-3" class="w-3.5 h-3.5 rounded-full border border-slate-400"></div>
            <div id="dot-4" class="w-3.5 h-3.5 rounded-full border border-slate-400"></div>
        </div>
        <div class="grid grid-cols-3 gap-8">
            <script>
                for(let i=1; i<=9; i++) document.write(`<button onclick="pressPin(${i})" class="w-16 h-16 text-3xl font-light">${i}</button>`);
            </script>
            <span></span>
            <button onclick="pressPin(0)" class="w-16 h-16 text-3xl font-light">0</button>
            <button onclick="clearPin()" class="text-xs font-medium text-blue-500">Puhasta</button>
        </div>
    </div>

    <header class="p-6 pt-12">
        <p id="current-day-display" class="text-red-500 font-bold text-xs uppercase tracking-widest mb-1"></p>
        <h1 id="page-title" class="text-3xl font-bold tracking-tight">Ülevaade</h1>
    </header>

    <main class="px-4 space-y-4">
        
        <div id="tab-dashboard" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="card p-4 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Kuu tunnid</p>
                    <h2 id="dash-month" class="text-2xl font-bold text-blue-600">0h</h2>
                </div>
                <div class="card p-4 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Saldo</p>
                    <h2 id="dash-balance" class="text-2xl font-bold">0 €</h2>
                </div>
            </div>
            
            <div class="card p-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 text-center">Nädala aktiivsus</p>
                <canvas id="workChart" height="180"></canvas>
            </div>

            <div class="card p-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 text-center">Finantsid</p>
                <canvas id="financeChart" height="180"></canvas>
            </div>
        </div>

        <div id="tab-work" class="tab-content space-y-4">
            <div class="card p-5 space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Kuupäev</label>
                    <input type="date" id="work-date">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="time" id="work-start">
                    <input type="time" id="work-end">
                </div>
                <input type="number" id="work-break" placeholder="Paus (min)">
                <input type="text" id="work-note" placeholder="Märge">
                <button onclick="logWork()" class="w-full btn-primary py-3.5 shadow-md">Salvesta</button>
            </div>
            <div class="card overflow-hidden">
                <div id="work-history-list"></div>
            </div>
        </div>

        <div id="tab-finance" class="tab-content space-y-4">
            <div class="card p-5 space-y-4">
                <div class="flex bg-gray-200/50 p-1 rounded-lg gap-1">
                    <button id="f-inc" onclick="setFinType('income')" class="flex-1 py-1.5 rounded-md text-xs font-semibold">Tulu</button>
                    <button id="f-exp" onclick="setFinType('expense')" class="flex-1 py-1.5 rounded-md text-xs font-semibold">Kulu</button>
                    <button id="f-bill" onclick="setFinType('bill')" class="flex-1 py-1.5 rounded-md text-xs font-semibold">Arve</button>
                </div>
                <input type="text" id="fin-name" placeholder="Kirjeldus">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="fin-amount" placeholder="0.00 €">
                    <input type="date" id="fin-date">
                </div>
                <button onclick="logFinance()" class="w-full btn-primary py-3.5 shadow-md">Lisa kanne</button>
            </div>
            <div class="card overflow-hidden">
                <div id="finance-history-list"></div>
            </div>
        </div>

        <div id="tab-lists" class="tab-content space-y-4">
            <div class="card p-4 flex gap-2">
                <input type="text" id="todo-input" placeholder="Uus rida...">
                <button onclick="addTodo()" class="bg-blue-500 text-white px-5 rounded-lg font-bold">+</button>
            </div>
            <div id="todo-list" class="space-y-2"></div>
        </div>

        <div id="tab-settings" class="tab-content p-6 text-center">
            <button onclick="clearData()" class="text-red-500 font-semibold py-4 w-full card border-red-200 bg-red-50/50">Kustuta kõik andmed</button>
            <p class="text-[10px] text-slate-400 mt-6 uppercase tracking-widest font-bold">Versioon 9.0</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/70 backdrop-blur-2xl border-t border-gray-300 flex justify-around p-3 pb-8 z-50">
        <button onclick="showTab('dashboard')" class="nav-btn active" id="nav-dashboard">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Kodu
        </button>
        <button onclick="showTab('work')" class="nav-btn" id="nav-work">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>Töö
        </button>
        <button onclick="showTab('finance')" class="nav-btn" id="nav-finance">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Raha
        </button>
        <button onclick="showTab('lists')" class="nav-btn" id="nav-lists">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>List
        </button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('minupaevik_v9')) || { work: [], finance: [], todos: [], pin: null };
        let currentPinInput = "", currentFinType = 'expense', wChart, fChart;

        function initApp() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('current-day-display').innerText = now.toLocaleDateString('et-ET', options);
            if (!db.pin) document.getElementById('pin-label').innerText = "Loo PIN kood";
            initCharts(); updateUI(); setFinType('expense');
        }

        function pressPin(n) {
            if (currentPinInput.length < 4) {
                currentPinInput += n;
                document.getElementById('dot-' + currentPinInput.length).classList.add('bg-blue-500', 'border-blue-500');
            }
            if (currentPinInput.length === 4) setTimeout(checkPin, 250);
        }

        function checkPin() {
            if (!db.pin) { db.pin = currentPinInput; save(); document.getElementById('pin-screen').style.display='none'; }
            else if (currentPinInput === db.pin) document.getElementById('pin-screen').style.display='none';
            else { alert("Vale PIN"); clearPin(); }
        }

        function clearPin() {
            currentPinInput = "";
            for(let i=1; i<=4; i++) document.getElementById('dot-'+i).classList.remove('bg-blue-500', 'border-blue-500');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            updateUI();
        }

        function setFinType(t) {
            currentFinType = t;
            ['f-inc','f-exp','f-bill'].forEach(id => document.getElementById(id).className = "flex-1 py-1.5 rounded-md text-xs font-semibold text-gray-500");
            document.getElementById(t === 'income' ? 'f-inc' : t === 'expense' ? 'f-exp' : 'f-bill').className = "flex-1 py-1.5 rounded-md text-xs font-semibold bg-white shadow-sm text-black";
        }

        function logWork() {
            const d = document.getElementById('work-date').value, s = document.getElementById('work-start').value, e = document.getElementById('work-end').value, b = parseInt(document.getElementById('work-break').value)||0, n = document.getElementById('work-note').value;
            if(!d || !s || !e) return;
            const hrs = (new Date(`2000/01/01 ${e}`) - new Date(`2000/01/01 ${s}`)) / 3600000 - (b/60);
            db.work.push({ id: Date.now(), date: d, hours: Math.max(0, hrs), note: n });
            document.getElementById('work-note').value = ""; save(); showTab('dashboard');
        }

        function logFinance() {
            const a = parseFloat(document.getElementById('fin-amount').value), n = document.getElementById('fin-name').value || 'Märkimata', d = document.getElementById('fin-date').value;
            if(!a || !d) return;
            db.finance.push({ id: Date.now(), type: currentFinType, name: n, amount: a, date: d });
            document.getElementById('fin-name').value = ""; document.getElementById('fin-amount').value = "";
            save();
        }

        function addTodo() {
            const t = document.getElementById('todo-input').value; if(!t) return;
            db.todos.push({ id: Date.now(), text: t, done: false });
            document.getElementById('todo-input').value = ""; save();
        }

        function toggleTodo(id) { const t = db.todos.find(x => x.id === id); t.done = !t.done; save(); }
        function deleteWork(id) { if(confirm("Kustuta?")) { db.work = db.work.filter(w => w.id !== id); save(); } }
        function deleteFinance(id) { if(confirm("Kustuta?")) { db.finance = db.finance.filter(f => f.id !== id); save(); } }

        function save() { localStorage.setItem('minupaevik_v9', JSON.stringify(db)); updateUI(); }

        function initCharts() {
            wChart = new Chart(document.getElementById('workChart'), { type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: '#007AFF', borderRadius: 4 }] }, options: { scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } } });
            fChart = new Chart(document.getElementById('financeChart'), { type: 'doughnut', data: { labels: ['Tulu', 'Kulu', 'Arve'], datasets: [{ data: [0,0,0], backgroundColor: ['#34C759', '#FF3B30', '#FF9500'], borderWidth: 0 }] }, options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, font: { size: 10 } } } } } });
        }

        function updateUI() {
            const now = new Date();
            const curMonth = now.getMonth(), curYear = now.getFullYear();
            
            const mHrs = db.work.filter(w => {
                const wd = new Date(w.date);
                return wd.getMonth() === curMonth && wd.getFullYear() === curYear;
            }).reduce((s, w) => s + w.hours, 0);

            const inc = db.finance.filter(f => f.type === 'income').reduce((s, f) => s + f.amount, 0), exp = db.finance.filter(f => f.type === 'expense').reduce((s, f) => s + f.amount, 0), bill = db.finance.filter(f => f.type === 'bill').reduce((s, f) => s + f.amount, 0);
            
            document.getElementById('dash-month').innerText = mHrs.toFixed(1) + 'h';
            document.getElementById('dash-balance').innerText = (inc - exp - bill).toLocaleString() + ' €';

            // Graafik: E-P
            const startOfWeek = new Date(now);
            const day = startOfWeek.getDay(), diff = startOfWeek.getDate() - day + (day == 0 ? -6 : 1);
            startOfWeek.setDate(diff);

            const last7 = [...Array(7)].map((_, i) => {
                const d = new Date(startOfWeek); d.setDate(d.getDate() + i);
                const ds = d.toISOString().split('T')[0];
                return { l: ["E","T","K","N","R","L","P"][i], v: db.work.filter(w => w.date === ds).reduce((s, w) => s + w.hours, 0) };
            });
            wChart.data.labels = last7.map(x => x.l); wChart.data.datasets[0].data = last7.map(x => x.v); wChart.update();
            fChart.data.datasets[0].data = [inc, exp, bill]; fChart.update();

            const fmt = (d) => d.split('-').reverse().join('.');
            document.getElementById('work-history-list').innerHTML = db.work.slice().reverse().map(w => `
                <div class="history-item" onclick="deleteWork(${w.id})">
                    <div><span class="font-semibold text-[15px]">${fmt(w.date)}</span><br><span class="text-[11px] text-gray-500">${w.note || 'Märge puudub'}</span></div>
                    <div class="font-semibold text-blue-600">${w.hours.toFixed(1)}h</div>
                </div>`).join('');

            document.getElementById('finance-history-list').innerHTML = db.finance.slice().reverse().map(f => `
                <div class="history-item" onclick="deleteFinance(${f.id})">
                    <div><span class="font-semibold text-[15px]">${f.name}</span><br><span class="text-[11px] text-gray-500">${fmt(f.date)}</span></div>
                    <div class="font-bold ${f.type==='income'?'text-green-500':'text-red-500'}">${f.type==='income'?'+':'-'} ${f.amount}€</div>
                </div>`).join('');

            document.getElementById('todo-list').innerHTML = db.todos.map(t => `
                <div class="card p-4 flex justify-between items-center ${t.done?'opacity-50':''}" onclick="toggleTodo(${t.id})">
                    <span class="${t.done?'line-through':''} text-sm font-medium">${t.text}</span>
                    <div class="w-5 h-5 rounded-full border ${t.done?'bg-blue-500 border-blue-500':'border-gray-300'}"></div>
                </div>`).join('');
        }

        function clearData() { if(confirm("Kustuta kõik andmed?")) { localStorage.clear(); location.reload(); } }
        document.getElementById('work-date').valueAsDate = new Date();
        document.getElementById('fin-date').valueAsDate = new Date();
        initApp();
    </script>
</body>
</html>

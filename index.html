<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work & Finance Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/4f46e5/ffffff?text=W">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 16px; border: 1px solid #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .pin-screen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; font-size: 16px; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: bold; }
        .nav-btn.active { color: #4f46e5; }
    </style>
</head>
<body class="pb-24">

    <div id="pin-screen" class="pin-screen">
        <h2 id="pin-label" class="text-2xl font-bold mb-6 text-slate-800">Enter PIN</h2>
        <div class="flex gap-4 mb-10">
            <div id="dot-1" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-2" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-3" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-4" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
        </div>
        <div class="grid grid-cols-3 gap-6">
            <button onclick="pressPin(1)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">1</button>
            <button onclick="pressPin(2)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">2</button>
            <button onclick="pressPin(3)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">3</button>
            <button onclick="pressPin(4)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">4</button>
            <button onclick="pressPin(5)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">5</button>
            <button onclick="pressPin(6)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">6</button>
            <button onclick="pressPin(7)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">7</button>
            <button onclick="pressPin(8)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">8</button>
            <button onclick="pressPin(9)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">9</button>
            <span></span>
            <button onclick="pressPin(0)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">0</button>
            <button onclick="clearPin()" class="text-xs font-bold text-red-500 uppercase">Clear</button>
        </div>
    </div>

    <header class="p-6">
        <h1 id="page-title" class="text-3xl font-black text-slate-900">Dashboard</h1>
        <p id="current-month-display" class="text-slate-500 font-medium italic"></p>
    </header>

    <main class="px-4 space-y-4">
        <div id="tab-dashboard" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="showTab('work')" class="card p-4 shadow-sm border-b-4 border-indigo-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Weekly Hours</p>
                    <h2 id="dash-week" class="text-2xl font-bold text-indigo-600">0h</h2>
                    <p class="text-[10px] text-slate-400">Month: <span id="dash-month">0h</span></p>
                </div>
                <div onclick="showTab('finance')" class="card p-4 shadow-sm border-b-4 border-emerald-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Income</p>
                    <h2 id="dash-income" class="text-2xl font-bold text-emerald-600">$0</h2>
                </div>
                <div onclick="showTab('finance')" class="card p-4 shadow-sm border-b-4 border-red-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Expenses</p>
                    <h2 id="dash-expenses" class="text-2xl font-bold text-red-600">$0</h2>
                </div>
                <div onclick="showTab('finance')" class="card p-4 shadow-sm border-b-4 border-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Balance</p>
                    <h2 id="dash-balance" class="text-2xl font-bold">$0</h2>
                </div>
            </div>
            <div class="card p-5 bg-gradient-to-br from-indigo-600 to-violet-700 text-white shadow-lg">
                <p id="saving-tip" class="text-sm font-medium leading-relaxed">Log hours to see insights.</p>
            </div>
        </div>

        <div id="tab-work" class="tab-content space-y-4">
            <div class="card p-5 space-y-4">
                <input type="date" id="work-date">
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" id="work-start">
                    <input type="time" id="work-end">
                </div>
                <input type="number" id="work-break" placeholder="Break Minutes (e.g. 30)">
                <button onclick="logWork()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Save Work Log</button>
            </div>
        </div>

        <div id="tab-finance" class="tab-content space-y-4">
            <div class="card p-5 space-y-4">
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button id="btn-inc" onclick="setFinType('income')" class="flex-1 py-2 rounded-lg font-bold">Income</button>
                    <button id="btn-exp" onclick="setFinType('expense')" class="flex-1 py-2 rounded-lg font-bold bg-white text-red-600 shadow">Expense</button>
                </div>
                <input type="number" id="fin-amount" placeholder="0.00">
                <input type="date" id="fin-date">
                <button onclick="logFinance()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Add Transaction</button>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="card p-5">
                <button onclick="clearData()" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-bold">Reset All App Data</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 pb-8">
        <button onclick="showTab('dashboard')" class="nav-btn active" id="nav-dashboard">🏠<br>Home</button>
        <button onclick="showTab('work')" class="nav-btn" id="nav-work">🕒<br>Work</button>
        <button onclick="showTab('finance')" class="nav-btn" id="nav-finance">💰<br>Finance</button>
        <button onclick="showTab('settings')" class="nav-btn" id="nav-settings">⚙️<br>Settings</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('secure_v2')) || { work: [], finance: [], pin: null };
        let currentPinInput = "";
        let currentFinType = 'expense';

        function initApp() {
            document.getElementById('current-month-display').innerText = new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'}) + " summary";
            if (!db.pin) document.getElementById('pin-label').innerText = "Set a 4-Digit PIN";
        }

        function pressPin(n) {
            if (currentPinInput.length < 4) {
                currentPinInput += n;
                document.getElementById('dot-' + currentPinInput.length).classList.add('bg-indigo-600', 'border-indigo-600');
            }
            if (currentPinInput.length === 4) setTimeout(checkPin, 250);
        }

        function checkPin() {
            if (!db.pin) {
                db.pin = currentPinInput;
                save();
                document.getElementById('pin-screen').style.display = 'none';
            } else if (currentPinInput === db.pin) {
                document.getElementById('pin-screen').style.display = 'none';
            } else {
                alert("Incorrect");
                clearPin();
            }
        }

        function clearPin() {
            currentPinInput = "";
            for(let i=1; i<=4; i++) document.getElementById('dot-'+i).classList.remove('bg-indigo-600', 'border-indigo-600');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            updateUI();
        }

        function setFinType(t) {
            currentFinType = t;
            document.getElementById('btn-inc').className = t === 'income' ? 'flex-1 py-2 rounded-lg font-bold bg-emerald-600 text-white' : 'flex-1 py-2 rounded-lg font-bold';
            document.getElementById('btn-exp').className = t === 'expense' ? 'flex-1 py-2 rounded-lg font-bold bg-white text-red-600 shadow' : 'flex-1 py-2 rounded-lg font-bold';
        }

        function logWork() {
            const s = document.getElementById('work-start').value;
            const e = document.getElementById('work-end').value;
            const b = parseInt(document.getElementById('work-break').value) || 0;
            if(!s || !e) return;
            const hrs = (new Date(`2000/01/01 ${e}`) - new Date(`2000/01/01 ${s}`)) / 3600000 - (b/60);
            db.work.push({ date: document.getElementById('work-date').value, hours: hrs, ts: Date.now() });
            save();
            showTab('dashboard');
        }

        function logFinance() {
            const a = parseFloat(document.getElementById('fin-amount').value);
            if(!a) return;
            db.finance.push({ type: currentFinType, amount: a, date: document.getElementById('fin-date').value });
            save();
            showTab('dashboard');
        }

        function save() { localStorage.setItem('secure_v2', JSON.stringify(db)); updateUI(); }

        function updateUI() {
            const weekAgo = Date.now() - 604800000;
            const wHrs = db.work.filter(w => w.ts > weekAgo).reduce((s, w) => s + w.hours, 0);
            const mHrs = db.work.reduce((s, w) => s + w.hours, 0);
            const inc = db.finance.filter(f => f.type === 'income').reduce((s, f) => s + f.amount, 0);
            const exp = db.finance.filter(f => f.type === 'expense').reduce((s, f) => s + f.amount, 0);
            document.getElementById('dash-week').innerText = wHrs.toFixed(1) + 'h';
            document.getElementById('dash-month').innerText = mHrs.toFixed(1) + 'h';
            document.getElementById('dash-income').innerText = '$' + inc;
            document.getElementById('dash-expenses').innerText = '$' + exp;
            document.getElementById('dash-balance').innerText = '$' + (inc - exp);
        }

        function clearData() { if(confirm("Reset all?")) { localStorage.clear(); location.reload(); } }

        document.getElementById('work-date').valueAsDate = new Date();
        document.getElementById('fin-date').valueAsDate = new Date();
        initApp();
        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work & Finance Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/4f46e5/ffffff?text=W">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 16px; border: 1px solid #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pin-screen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; font-size: 16px; outline: none; }
        input:focus { border-color: #4f46e5; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: bold; }
        .nav-btn.active { color: #4f46e5; }
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f8fafc; }
    </style>
</head>
<body class="pb-32">

    <div id="pin-screen" class="pin-screen">
        <h2 id="pin-label" class="text-2xl font-bold mb-6 text-slate-800">Enter PIN</h2>
        <div class="flex gap-4 mb-10">
            <div id="dot-1" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-2" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-3" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-4" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
        </div>
        <div class="grid grid-cols-3 gap-6">
            <script>
                for(let i=1; i<=9; i++) document.write(`<button onclick="pressPin(${i})" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">${i}</button>`);
            </script>
            <span></span>
            <button onclick="pressPin(0)" class="w-16 h-16 rounded-full bg-slate-50 text-2xl font-bold active:bg-indigo-100">0</button>
            <button onclick="clearPin()" class="text-xs font-bold text-red-500 uppercase">Clear</button>
        </div>
    </div>

    <header class="p-6">
        <h1 id="page-title" class="text-3xl font-black text-slate-900">Dashboard</h1>
        <p id="current-month-display" class="text-slate-500 font-medium italic"></p>
    </header>

    <main class="px-4 space-y-4">
        
        <div id="tab-dashboard" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div onclick="showTab('work')" class="card p-3 border-b-4 border-indigo-500 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Week Hours</p>
                    <h2 id="dash-week" class="text-xl font-bold text-indigo-600">0h</h2>
                </div>
                <div onclick="showTab('finance')" class="card p-3 border-b-4 border-emerald-500 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Balance</p>
                    <h2 id="dash-balance" class="text-xl font-bold text-slate-800">$0</h2>
                </div>
            </div>
            <div class="card p-4">
                <canvas id="workChart" class="mb-6"></canvas>
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <div id="tab-work" class="tab-content space-y-4">
            <div class="card p-5 space-y-4 shadow-sm">
                <input type="date" id="work-date">
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" id="work-start">
                    <input type="time" id="work-end">
                </div>
                <input type="number" id="work-break" placeholder="Break mins (e.g. 30)">
                <input type="text" id="work-note" placeholder="Note (e.g. Late shift, busy day)">
                <button onclick="logWork()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Save Work Log</button>
            </div>
            <div class="card p-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-3">Work History</h3>
                <div id="work-history-list" class="space-y-1 text-sm"></div>
            </div>
        </div>

        <div id="tab-finance" class="tab-content space-y-4">
            <div class="card p-5 space-y-4 shadow-sm">
                <div class="flex bg-slate-100 p-1 rounded-xl gap-1">
                    <button id="f-inc" onclick="setFinType('income')" class="flex-1 py-2 rounded-lg text-xs font-bold">Income</button>
                    <button id="f-exp" onclick="setFinType('expense')" class="flex-1 py-2 rounded-lg text-xs font-bold">Expense</button>
                    <button id="f-bill" onclick="setFinType('bill')" class="flex-1 py-2 rounded-lg text-xs font-bold">Bill</button>
                </div>
                <input type="text" id="fin-name" placeholder="Name (e.g. Rent, Groceries)">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="fin-amount" placeholder="0.00">
                    <input type="date" id="fin-date">
                </div>
                <button onclick="logFinance()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Add Transaction</button>
            </div>
            <div class="card p-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-3">Recent Finance</h3>
                <div id="finance-history-list" class="space-y-1 text-sm"></div>
            </div>
        </div>

        <div id="tab-lists" class="tab-content space-y-4">
            <div class="card p-5 space-y-3">
                <div class="flex gap-2">
                    <input type="text" id="todo-input" placeholder="New task or bill reminder...">
                    <button onclick="addTodo()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">+</button>
                </div>
            </div>
            <div id="todo-list" class="space-y-2"></div>
        </div>

        <div id="tab-settings" class="tab-content p-4 text-center">
            <button onclick="clearData()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-bold">Reset All Data</button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-4 pb-8 z-50">
        <button onclick="showTab('dashboard')" class="nav-btn active" id="nav-dashboard">🏠<br>Home</button>
        <button onclick="showTab('work')" class="nav-btn" id="nav-work">🕒<br>Work</button>
        <button onclick="showTab('finance')" class="nav-btn" id="nav-finance">💰<br>Finance</button>
        <button onclick="showTab('lists')" class="nav-btn" id="nav-lists">📝<br>Lists</button>
        <button onclick="showTab('settings')" class="nav-btn" id="nav-settings">⚙️<br>Setup</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('secure_v6')) || { work: [], finance: [], todos: [], pin: null };
        let currentPinInput = "", currentFinType = 'expense', wChart, fChart;

        function initApp() {
            document.getElementById('current-month-display').innerText = new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'});
            if (!db.pin) document.getElementById('pin-label').innerText = "Create Your PIN";
            initCharts(); updateUI(); setFinType('expense');
        }

        function pressPin(n) {
            if (currentPinInput.length < 4) {
                currentPinInput += n;
                document.getElementById('dot-' + currentPinInput.length).classList.add('bg-indigo-600', 'border-indigo-600');
            }
            if (currentPinInput.length === 4) setTimeout(checkPin, 250);
        }

        function checkPin() {
            if (!db.pin) { db.pin = currentPinInput; save(); document.getElementById('pin-screen').style.display='none'; }
            else if (currentPinInput === db.pin) document.getElementById('pin-screen').style.display='none';
            else { alert("Wrong"); clearPin(); }
        }

        function clearPin() {
            currentPinInput = "";
            for(let i=1; i<=4; i++) document.getElementById('dot-'+i).classList.remove('bg-indigo-600', 'border-indigo-600');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            updateUI();
        }

        function setFinType(t) {
            currentFinType = t;
            ['f-inc','f-exp','f-bill'].forEach(id => document.getElementById(id).className = "flex-1 py-2 rounded-lg text-xs font-bold transition-all");
            document.getElementById(t === 'income' ? 'f-inc' : t === 'expense' ? 'f-exp' : 'f-bill').className += " bg-white shadow-md text-slate-900";
        }

        function logWork() {
            const s = document.getElementById('work-start').value, e = document.getElementById('work-end').value, b = parseInt(document.getElementById('work-break').value)||0, n = document.getElementById('work-note').value;
            if(!s || !e) return;
            const hrs = (new Date(`2000/01/01 ${e}`) - new Date(`2000/01/01 ${s}`)) / 3600000 - (b/60);
            db.work.push({ id: Date.now(), date: document.getElementById('work-date').value, hours: Math.max(0, hrs), note: n, ts: Date.now() });
            document.getElementById('work-note').value = ""; save(); showTab('dashboard');
        }

        function logFinance() {
            const a = parseFloat(document.getElementById('fin-amount').value), n = document.getElementById('fin-name').value || 'Transaction';
            if(!a) return;
            db.finance.push({ id: Date.now(), type: currentFinType, name: n, amount: a, date: document.getElementById('fin-date').value });
            document.getElementById('fin-name').value = ""; document.getElementById('fin-amount').value = "";
            save();
        }

        function addTodo() {
            const t = document.getElementById('todo-input').value; if(!t) return;
            db.todos.push({ id: Date.now(), text: t, done: false });
            document.getElementById('todo-input').value = ""; save();
        }

        function toggleTodo(id) { const todo = db.todos.find(x => x.id === id); todo.done = !todo.done; save(); }
        function deleteFinance(id) { if(confirm("Delete this?")) { db.finance = db.finance.filter(f => f.id !== id); save(); } }
        function deleteWork(id) { if(confirm("Delete this shift?")) { db.work = db.work.filter(w => w.id !== id); save(); } }

        function save() { localStorage.setItem('secure_v6', JSON.stringify(db)); updateUI(); }

        function initCharts() {
            wChart = new Chart(document.getElementById('workChart'), { type: 'bar', data: { labels: [], datasets: [{ label: 'Work Hours', data: [], backgroundColor: '#6366f1', borderRadius: 8 }] }, options: { plugins: { legend: { display: false } } } });
            fChart = new Chart(document.getElementById('financeChart'), { type: 'doughnut', data: { labels: ['In', 'Out', 'Bill'], datasets: [{ data: [0,0,0], backgroundColor: ['#10b981', '#ef4444', '#f97316'] }] }, options: { plugins: { legend: { position: 'bottom' } } } });
        }

        function updateUI() {
            const weekAgo = Date.now() - 604800000;
            const wHrs = db.work.filter(w => w.ts > weekAgo).reduce((s, w) => s + w.hours, 0);
            const inc = db.finance.filter(f => f.type === 'income').reduce((s, f) => s + f.amount, 0), exp = db.finance.filter(f => f.type === 'expense').reduce((s, f) => s + f.amount, 0), bill = db.finance.filter(f => f.type === 'bill').reduce((s, f) => s + f.amount, 0);

            document.getElementById('dash-week').innerText = wHrs.toFixed(1) + 'h';
            document.getElementById('dash-balance').innerText = '$' + (inc - exp - bill).toLocaleString();

            const last7 = [...Array(7)].map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i)); const ds = d.toISOString().split('T')[0];
                return { l: d.toLocaleDateString('en-US', {weekday:'short'}), v: db.work.filter(w => w.date === ds).reduce((s, w) => s + w.hours, 0) };
            });
            wChart.data.labels = last7.map(x => x.l); wChart.data.datasets[0].data = last7.map(x => x.v); wChart.update();
            fChart.data.datasets[0].data = [inc, exp, bill]; fChart.update();

            document.getElementById('finance-history-list').innerHTML = db.finance.slice().reverse().map(f => `
                <div class="history-item" onclick="deleteFinance(${f.id})">
                    <div><span class="font-bold">${f.name}</span><br><span class="text-[10px] text-slate-400">${f.date}</span></div>
                    <div class="font-black ${f.type==='income'?'text-emerald-500':'text-red-500'}">${f.type==='income'?'+':'-'}$${f.amount}</div>
                </div>`).join('');

            document.getElementById('work-history-list').innerHTML = db.work.slice().reverse().map(w => `
                <div class="history-item" onclick="deleteWork(${w.id})">
                    <div><span class="font-bold">${w.date}</span><br><span class="text-[10px] text-slate-500 italic">${w.note || 'No note'}</span></div>
                    <div class="font-black text-indigo-600">${w.hours.toFixed(1)}h</div>
                </div>`).join('');

            document.getElementById('todo-list').innerHTML = db.todos.map(t => `
                <div class="card p-4 flex justify-between items-center ${t.done?'opacity-40':''}" onclick="toggleTodo(${t.id})">
                    <span class="${t.done?'line-through':''} font-medium text-sm">${t.text}</span>
                    <div class="w-5 h-5 rounded-full border-2 ${t.done?'bg-indigo-500 border-indigo-500':'border-slate-200'}"></div>
                </div>`).join('');
        }

        function clearData() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }
        document.getElementById('work-date').valueAsDate = new Date();
        document.getElementById('fin-date').valueAsDate = new Date();
        initApp();
    </script>
</body>
</html>

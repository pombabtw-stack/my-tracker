<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minu Päevik</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/4f46e5/ffffff?text=M">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .pin-screen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; width: 100%; font-size: 16px; outline: none; transition: all 0.2s; }
        input:focus { border-color: #6366f1; ring: 2px; ring-color: #6366f1; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 11px; font-weight: 600; transition: all 0.2s; }
        .nav-btn.active { color: #4f46e5; transform: scale(1.1); }
        .history-item { display: flex; justify-content: space-between; padding: 14px; border-bottom: 1px solid #f8fafc; border-radius: 12px; }
        .history-item:active { background-color: #f1f5f9; }
    </style>
</head>
<body class="pb-32">

    <div id="pin-screen" class="pin-screen">
        <h2 id="pin-label" class="text-2xl font-bold mb-8 text-slate-800 tracking-tight">Sisesta PIN</h2>
        <div class="flex gap-5 mb-12">
            <div id="dot-1" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-2" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-3" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
            <div id="dot-4" class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
        </div>
        <div class="grid grid-cols-3 gap-6">
            <script>
                for(let i=1; i<=9; i++) document.write(`<button onclick="pressPin(${i})" class="w-18 h-18 text-2xl font-semibold active:scale-90 transition-transform">${i}</button>`);
            </script>
            <span></span>
            <button onclick="pressPin(0)" class="w-18 h-18 text-2xl font-semibold active:scale-90 transition-transform">0</button>
            <button onclick="clearPin()" class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Kustuta</button>
        </div>
    </div>

    <header class="p-6 pt-10">
        <h1 id="page-title" class="text-3xl font-black text-slate-900 tracking-tight">Ülevaade</h1>
        <p id="current-month-display" class="text-slate-400 font-semibold text-sm mt-1"></p>
    </header>

    <main class="px-4 space-y-5">
        
        <div id="tab-dashboard" class="tab-content active space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="card p-4 border-b-4 border-indigo-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nädala tunnid</p>
                    <h2 id="dash-week" class="text-2xl font-bold text-indigo-600">0h</h2>
                </div>
                <div class="card p-4 border-b-4 border-emerald-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Saldo</p>
                    <h2 id="dash-balance" class="text-2xl font-bold text-slate-800">$0</h2>
                </div>
            </div>
            <div class="card p-5">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest text-center">Tööaja jaotuvus</p>
                <canvas id="workChart" height="150"></canvas>
            </div>
            <div class="card p-5">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest text-center">Rahaline jaotuvus</p>
                <canvas id="financeChart" height="200"></canvas>
            </div>
        </div>

        <div id="tab-work" class="tab-content space-y-5">
            <div class="card p-6 space-y-4">
                <input type="date" id="work-date">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Algus</label>
                        <input type="time" id="work-start">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Lõpp</label>
                        <input type="time" id="work-end">
                    </div>
                </div>
                <input type="number" id="work-break" placeholder="Paus (minutid)">
                <input type="text" id="work-note" placeholder="Märge">
                <button onclick="logWork()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">Salvesta tööaeg</button>
            </div>
            <div id="work-history-list" class="space-y-2 pb-4"></div>
        </div>

        <div id="tab-finance" class="tab-content space-y-5">
            <div class="card p-6 space-y-4">
                <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-1">
                    <button id="f-inc" onclick="setFinType('income')" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all">Tulu</button>
                    <button id="f-exp" onclick="setFinType('expense')" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all">Kulu</button>
                    <button id="f-bill" onclick="setFinType('bill')" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all">Arve</button>
                </div>
                <input type="text" id="fin-name" placeholder="Kirjeldus">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="fin-amount" placeholder="Summa">
                    <input type="date" id="fin-date">
                </div>
                <button onclick="logFinance()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">Lisa kanne</button>
            </div>
            <div id="finance-history-list" class="space-y-2 pb-4"></div>
        </div>

        <div id="tab-lists" class="tab-content space-y-5">
            <div class="card p-6 space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="todo-input" placeholder="Kirjuta siia...">
                    <button onclick="addTodo()" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold active:scale-90 transition-all">+</button>
                </div>
            </div>
            <div id="todo-list" class="space-y-3 pb-4"></div>
        </div>

        <div id="tab-settings" class="tab-content p-6 text-center space-y-4">
            <div class="card p-8 bg-red-50 border-red-100">
                <p class="text-sm text-red-600 font-medium mb-4">Ettevaatust! See tegevus on lõplik.</p>
                <button onclick="clearData()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg">Kustuta kõik andmed</button>
            </div>
            <p class="text-[10px] text-slate-300 uppercase tracking-widest font-bold">Versioon 8.0</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around p-4 pb-10 z-50">
        <button onclick="showTab('dashboard')" class="nav-btn active" id="nav-dashboard">🏠<br>Kodu</button>
        <button onclick="showTab('work')" class="nav-btn" id="nav-work">🕒<br>Töö</button>
        <button onclick="showTab('finance')" class="nav-btn" id="nav-finance">💰<br>Raha</button>
        <button onclick="showTab('lists')" class="nav-btn" id="nav-lists">📝<br>List</button>
        <button onclick="showTab('settings')" class="nav-btn" id="nav-settings">⚙️<br>Sätted</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('minupaevik_v8')) || { work: [], finance: [], todos: [], pin: null };
        let currentPinInput = "", currentFinType = 'expense', wChart, fChart;

        function initApp() {
            const date = new Date();
            const months = ["jaanuar", "veebruar", "märts", "aprill", "mai", "juuni", "juuli", "august", "september", "oktoober", "november", "detsember"];
            document.getElementById('current-month-display').innerText = months[date.getMonth()].toUpperCase() + " " + date.getFullYear();
            if (!db.pin) document.getElementById('pin-label').innerText = "Loo PIN kood";
            initCharts(); updateUI(); setFinType('expense');
        }

        function pressPin(n) {
            if (currentPinInput.length < 4) {
                currentPinInput += n;
                document.getElementById('dot-' + currentPinInput.length).classList.add('bg-indigo-600', 'border-indigo-600');
            }
            if (currentPinInput.length === 4) setTimeout(checkPin, 250);
        }

        function checkPin() {
            if (!db.pin) { db.pin = currentPinInput; save(); document.getElementById('pin-screen').style.display='none'; }
            else if (currentPinInput === db.pin) document.getElementById('pin-screen').style.display='none';
            else { alert("Vale PIN"); clearPin(); }
        }

        function clearPin() {
            currentPinInput = "";
            for(let i=1; i<=4; i++) document.getElementById('dot-'+i).classList.remove('bg-indigo-600', 'border-indigo-600');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            const titles = {dashboard: 'Ülevaade', work: 'Tööaeg', finance: 'Rahakott', lists: 'Nimekirjad', settings: 'Seaded'};
            document.getElementById('page-title').innerText = titles[id];
            updateUI();
        }

        function setFinType(t) {
            currentFinType = t;
            ['f-inc','f-exp','f-bill'].forEach(id => document.getElementById(id).className = "flex-1 py-2 rounded-xl text-xs font-bold transition-all text-slate-500");
            document.getElementById(t === 'income' ? 'f-inc' : t === 'expense' ? 'f-exp' : 'f-bill').className = "flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-slate-900";
        }

        function logWork() {
            const s = document.getElementById('work-start').value, e = document.getElementById('work-end').value, b = parseInt(document.getElementById('work-break').value)||0, n = document.getElementById('work-note').value;
            if(!s || !e) return;
            const hrs = (new Date(`2000/01/01 ${e}`) - new Date(`2000/01/01 ${s}`)) / 3600000 - (b/60);
            db.work.push({ id: Date.now(), date: document.getElementById('work-date').value, hours: Math.max(0, hrs), note: n, ts: Date.now() });
            document.getElementById('work-note').value = ""; save(); showTab('dashboard');
        }

        function logFinance() {
            const a = parseFloat(document.getElementById('fin-amount').value), n = document.getElementById('fin-name').value || 'Märkimata';
            if(!a) return;
            db.finance.push({ id: Date.now(), type: currentFinType, name: n, amount: a, date: document.getElementById('fin-date').value });
            document.getElementById('fin-name').value = ""; document.getElementById('fin-amount').value = "";
            save();
        }

        function addTodo() {
            const t = document.getElementById('todo-input').value; if(!t) return;
            db.todos.push({ id: Date.now(), text: t, done: false });
            document.getElementById('todo-input').value = ""; save();
        }

        function toggleTodo(id) { const todo = db.todos.find(x => x.id === id); todo.done = !todo.done; save(); }
        function deleteFinance(id) { if(confirm("Kustuta see kanne?")) { db.finance = db.finance.filter(f => f.id !== id); save(); } }
        function deleteWork(id) { if(confirm("Kustuta see vahetus?")) { db.work = db.work.filter(w => w.id !== id); save(); } }

        function save() { localStorage.setItem('minupaevik_v8', JSON.stringify(db)); updateUI(); }

        function initCharts() {
            wChart = new Chart(document.getElementById('workChart'), { type: 'bar', data: { labels: [], datasets: [{ label: 'Tunnid', data: [], backgroundColor: '#6366f1', borderRadius: 8 }] }, options: { scales: { y: { beginAtZero: true, grid: { display: false } } }, plugins: { legend: { display: false } } } });
            fChart = new Chart(document.getElementById('financeChart'), { type: 'doughnut', data: { labels: ['Tulu', 'Kulu', 'Arve'], datasets: [{ data: [0,0,0], backgroundColor: ['#10b981', '#ef4444', '#f97316'], borderWidth: 0 }] }, options: { plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } }, cutout: '70%' } });
        }

        function updateUI() {
            const weekAgo = Date.now() - 604800000;
            const wHrs = db.work.filter(w => w.ts > weekAgo).reduce((s, w) => s + w.hours, 0);
            const inc = db.finance.filter(f => f.type === 'income').reduce((s, f) => s + f.amount, 0), exp = db.finance.filter(f => f.type === 'expense').reduce((s, f) => s + f.amount, 0), bill = db.finance.filter(f => f.type === 'bill').reduce((s, f) => s + f.amount, 0);
            document.getElementById('dash-week').innerText = wHrs.toFixed(1) + 'h';
            document.getElementById('dash-balance').innerText = '$' + (inc - exp - bill).toLocaleString();

            const last7 = [...Array(7)].map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i)); const ds = d.toISOString().split('T')[0];
                return { l: ["P","E","T","K","N","R","L"][d.getDay()], v: db.work.filter(w => w.date === ds).reduce((s, w) => s + w.hours, 0) };
            });
            wChart.data.labels = last7.map(x => x.l); wChart.data.datasets[0].data = last7.map(x => x.v); wChart.update();
            fChart.data.datasets[0].data = [inc, exp, bill]; fChart.update();

            document.getElementById('finance-history-list').innerHTML = db.finance.slice().reverse().map(f => `
                <div class="card p-1 mb-2"><div class="history-item" onclick="deleteFinance(${f.id})">
                    <div><span class="font-bold text-slate-800">${f.name}</span><br><span class="text-[10px] text-slate-400 font-bold">${f.date}</span></div>
                    <div class="font-black ${f.type==='income'?'text-emerald-500':'text-red-500'}">${f.type==='income'?'+':'-'}$${f.amount}</div>
                </div></div>`).join('');

            document.getElementById('work-history-list').innerHTML = db.work.slice().reverse().map(w => `
                <div class="card p-1 mb-2"><div class="history-item" onclick="deleteWork(${w.id})">
                    <div><span class="font-bold text-slate-800">${w.date}</span><br><span class="text-[10px] text-slate-400 font-bold italic">${w.note || 'Märge puudub'}</span></div>
                    <div class="font-black text-indigo-600">${w.hours.toFixed(1)}h</div>
                </div></div>`).join('');

            document.getElementById('todo-list').innerHTML = db.todos.map(t => `
                <div class="card p-4 flex justify-between items-center ${t.done?'opacity-40':''}" onclick="toggleTodo(${t.id})">
                    <span class="${t.done?'line-through':''} font-semibold text-slate-700 text-sm">${t.text}</span>
                    <div class="w-6 h-6 rounded-full border-2 ${t.done?'bg-indigo-500 border-indigo-500':'border-slate-200'}"></div>
                </div>`).join('');
        }

        function clearData() { if(confirm("Kustuta kõik andmed?")) { localStorage.clear(); location.reload(); } }
        document.getElementById('work-date').valueAsDate = new Date();
        document.getElementById('fin-date').valueAsDate = new Date();
        initApp();
    </script>
</body>
</html>
